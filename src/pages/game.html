<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory - Game</title>
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/assets/favicon/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/assets/favicon/android-chrome-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="shortcut icon"
      sizes="any"
      href="/assets/favicon/favicon.ico"
      type="image/x-icon"
    />
    <script type="module" src="/src/scripts/Entrys/game-page.ts" defer></script>
  </head>
  <body data-theme="code-vibe" id="game-page">
    <header>
      <div class="game-header">
        <div class="game-header__left">
          <div class="game-feedback">
            <section class="points-container">
              <div class="points-container__team-1">
                <img
                  id="team-1-icon"
                  class="points-container__team-1__icon"
                  src="/assets/imgs/themes/code-vibe-theme/team-1-icon.svg"
                  alt="Team 1 icon"
                />
                <span id="team-1-score" class="points-container__team-1__score"
                  >0</span
                >
              </div>
              <div class="points-container__team-2">
                <img
                  id="team-2-icon"
                  class="points-container__team-2__icon"
                  src="/assets/imgs/themes/code-vibe-theme/team-2-icon.svg"
                  alt="Team 2 icon"
                />
                <span id="team-2-score" class="points-container__team-2__score"
                  >0</span
                >
              </div>
            </section>
          </div>
        </div>
        <section class="turn-indicator">
          <span class="turn-indicator__text">Current Player:</span>
          <img
            id="current-player-icon"
            class="turn-indicator__icon"
            src="/assets/imgs/themes/code-vibe-theme/current-player-icon-player-1.svg"
            alt="Current team icon"
          />
        </section>
        <div class="game-header__right">
          <button class="game-header__btn" id="open-exit-dialog" type="button">
            <svg
              width="30"
              height="30"
              viewBox="0 0 30 30"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="game-header__btn__icon"
              aria-label="Exit game Icon"
            >
              <mask
                id="mask0_16488_394"
                style="mask-type: alpha"
                maskUnits="userSpaceOnUse"
                x="0"
                y="0"
                width="30"
                height="30"
              >
                <rect width="30" height="30" fill="#D9D9D9" />
              </mask>
              <g mask="url(#mask0_16488_394)">
                <path
                  d="M25.1875 16.25H11.25C10.8958 16.25 10.599 16.1302 10.3594 15.8906C10.1198 15.651 10 15.3542 10 15C10 14.6458 10.1198 14.349 10.3594 14.1094C10.599 13.8698 10.8958 13.75 11.25 13.75H25.1875L24.125 12.6875C23.875 12.4375 23.7552 12.1458 23.7656 11.8125C23.776 11.4792 23.8958 11.1875 24.125 10.9375C24.375 10.6875 24.6719 10.5573 25.0156 10.5469C25.3594 10.5365 25.6562 10.6562 25.9062 10.9062L29.125 14.125C29.375 14.375 29.5 14.6667 29.5 15C29.5 15.3333 29.375 15.625 29.125 15.875L25.9062 19.0938C25.6562 19.3438 25.3594 19.4635 25.0156 19.4531C24.6719 19.4427 24.375 19.3125 24.125 19.0625C23.8958 18.8125 23.776 18.5208 23.7656 18.1875C23.7552 17.8542 23.875 17.5625 24.125 17.3125L25.1875 16.25ZM18.75 10V6.25H6.25V23.75H18.75V20C18.75 19.6458 18.8698 19.349 19.1094 19.1094C19.349 18.8698 19.6458 18.75 20 18.75C20.3542 18.75 20.651 18.8698 20.8906 19.1094C21.1302 19.349 21.25 19.6458 21.25 20V23.75C21.25 24.4375 21.0052 25.026 20.5156 25.5156C20.026 26.0052 19.4375 26.25 18.75 26.25H6.25C5.5625 26.25 4.97396 26.0052 4.48438 25.5156C3.99479 25.026 3.75 24.4375 3.75 23.75V6.25C3.75 5.5625 3.99479 4.97396 4.48438 4.48438C4.97396 3.99479 5.5625 3.75 6.25 3.75H18.75C19.4375 3.75 20.026 3.99479 20.5156 4.48438C21.0052 4.97396 21.25 5.5625 21.25 6.25V10C21.25 10.3542 21.1302 10.651 20.8906 10.8906C20.651 11.1302 20.3542 11.25 20 11.25C19.6458 11.25 19.349 11.1302 19.1094 10.8906C18.8698 10.651 18.75 10.3542 18.75 10Z"
                  fill="currentColor"
                />
              </g>
            </svg>
            <span class="game-header__btn__text">Exit game</span>
          </button>
        </div>
      </div>
    </header>
    <main class="game-container">
      <section class="game-field" id="field"></section>
      <dialog
        class="exit-dialog"
        id="exit-dialog"
        aria-labelledby="exit-dialog-title"
        aria-modal="true"
      >
        <div class="exit-dialog__panel" id="exit-dialog-panel">
          <p class="exit-dialog__text" id="exit-dialog-title">
            Are you sure you want to quit<br />the game?
          </p>
          <div class="exit-dialog__buttons-container">
            <button
              type="button"
              id="cancel-exit"
              class="exit-dialog__button exit-dialog__button--cancel"
            >
              Back to game
            </button>
            <a
              id="confirm-exit"
              class="exit-dialog__button exit-dialog__button--confirm"
              href="/index.html"
            >
              Exit game
            </a>
          </div>
        </div>
      </dialog>
      <dialog
        class="finished-game-dialog"
        id="finished-game-dialog"
        aria-labelledby="finished-game-dialog-title"
        aria-modal="true"
      >
        <canvas
          id="winner-confetti-canvas"
          class="finished-game-dialog__confetti-canvas"
          aria-hidden="true"
        ></canvas>
        <div class="finished-game-dialog__panel">
          <div class="win-status-container">
            <p
              class="finished-game-dialog__text"
              id="finished-game-dialog-title"
            >
              The winner is<br />
              <span class="finished-game-dialog__winner" id="winner-text"
                >Orange Player</span
              >
            </p>
          </div>
          <img
            id="winner-icon"
            src="#"
            alt="winner icon"
            class="finished-game-dialog__winner-icon"
          />
          <img
            id="draw-icon"
            src="#"
            alt="draw icon"
            class="finished-game-dialog__draw-icon"
          />
          <a
            id="play-again"
            class="finished-game-dialog__button"
            href="/index.html"
          >
            Back to start
          </a>
        </div>
        <div id="game-finished-info" class="game-finished-info">
          <div class="finished-info-content">
            <img
              src="#"
              alt="Game Over"
              class="finished-info-content__game-over-icon"
            />
            <p class="finished-info-content__score-info">Final Score</p>
            <section class="points-container margin-top-24">
              <div class="points-container__team-1">
                <img
                  class="points-container__team-1__icon"
                  src="/assets/imgs/themes/code-vibe-theme/team-1-icon.svg"
                  alt="Team 1 icon"
                />
                <span
                  id="team-1-finished-score"
                  class="points-container__team-1__score"
                  >0</span
                >
              </div>
              <div class="points-container__team-2">
                <img
                  class="points-container__team-2__icon"
                  src="/assets/imgs/themes/code-vibe-theme/team-2-icon.svg"
                  alt="Team 2 icon"
                />
                <span
                  id="team-2-finished-score"
                  class="points-container__team-2__score"
                  >0</span
                >
              </div>
            </section>
          </div>
        </div>
      </dialog>
    </main>
  </body>
</html>
