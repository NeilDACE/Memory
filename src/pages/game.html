<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory - Game</title>
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/assets/favicon/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/assets/favicon/android-chrome-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="shortcut icon"
      sizes="any"
      href="/assets/favicon/favicon.ico"
      type="image/x-icon"
    />
    <script type="module" src="/src/main.ts" defer></script>
    <link rel="stylesheet" href="/src/main.scss" />
    <link rel="stylesheet" href="/src/styles/pages/game.scss" />
  </head>
  <body data-theme="code-vibe">
    <header>
      <div class="game-header">
        <div class="game-feedback">
          <section class="points-container">
            <div class="points-container__team-1">
              <img
                id="team-1-icon"
                class="points-container__team-1__icon"
                src="/public/assets/imgs/themes/code-vibe-theme/team-1-icon.svg"
                alt="Team 1 icon"
              />
              <span id="team-1-score" class="points-container__team-1__score"
                >0</span
              >
            </div>
            <div class="points-container__team-2">
              <img
                id="team-2-icon"
                class="points-container__team-2__icon"
                src="/public/assets/imgs/themes/code-vibe-theme/team-2-icon.svg"
                alt="Team 2 icon"
              />
              <span id="team-2-score" class="points-container__team-2__score"
                >0</span
              >
            </div>
          </section>
          <section class="turn-indicator">
            <span class="turn-indicator__text">Current Player:</span>
            <img
              id="current-player-icon"
              class="turn-indicator__icon"
              src="/public/assets/imgs/themes/code-vibe-theme/current-player-icon-player-1.svg"
              alt="Current team icon"
            />
          </section>
        </div>
        <button class="game-header__btn" id="open-exit-dialog" type="button">
          <img
            class="game-header__btn__icon"
            src="/public/assets/imgs/move_item.svg"
            alt="Settings icon"
          />
          <span class="game-header__btn__text">Exit game</span>
        </button>
      </div>
    </header>
    <main class="game-container">
      <section class="game-field" id="field"></section>
      <dialog
        class="exit-dialog"
        id="exit-dialog"
        aria-labelledby="exit-dialog-title"
        aria-modal="true"
      >
        <div class="exit-dialog__panel">
          <p class="exit-dialog__text" id="exit-dialog-title">
            Are you sure you want to quit<br />the game?
          </p>
          <div class="exit-dialog__buttons-container">
            <button
              type="button"
              id="cancel-exit"
              class="exit-dialog__button exit-dialog__button--cancel"
            >
              Back to game
            </button>
            <button
              type="button"
              id="confirm-exit"
              class="exit-dialog__button exit-dialog__button--confirm"
            >
              Exit game
            </button>
          </div>
        </div>
      </dialog>
    </main>
  </body>
</html>
