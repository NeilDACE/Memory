<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory - Settings</title>
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/assets/favicon/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/assets/favicon/android-chrome-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="shortcut icon"
      sizes="any"
      href="/assets/favicon/favicon.ico"
      type="image/x-icon"
    />
    <script
      type="module"
      src="/src/scripts/Entrys/settings-page.ts"
      defer
    ></script>
    <link rel="stylesheet" href="/src/main.scss" />
    <link rel="stylesheet" href="/src/styles/pages/settings.scss" />
  </head>
  <body>
    <main class="settings-container">
      <h1 class="settings-title">Settings</h1>
      <div class="settings-content">
        <div class="left-container">
          <section class="settings-section">
            <h2 class="settings-section__title">
              <img src="/assets/imgs/palette.svg" alt="Palette icon" />Game
              themes
            </h2>
            <ul class="settings-section__options">
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="theme"
                    value="code-vibe"
                  />
                  <span class="radio-box"></span>
                  Code vibes theme
                  <div class="selected-marker"></div>
                </label>
              </li>
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="theme"
                    value="gaming"
                  />
                  <span class="radio-box"></span>
                  Gaming theme
                  <div class="selected-marker"></div>
                </label>
              </li>
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="theme"
                    value="projects"
                  />
                  <span class="radio-box"></span>
                  DA Projects theme
                  <div class="selected-marker"></div>
                </label>
              </li>
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="theme"
                    value="foods"
                  />
                  <span class="radio-box"></span>
                  Foods theme
                  <div class="selected-marker"></div>
                </label>
              </li>
            </ul>
          </section>
          <section class="settings-section">
            <h2 class="settings-section__title">
              <img
                src="/assets/imgs/chess-pawn.svg"
                alt="Chess pawn icon"
              />Choose player
            </h2>
            <ul class="settings-section__options">
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="player"
                    value="blue"
                  />
                  <span class="radio-box"></span>
                  Blue
                  <div class="selected-marker"></div>
                </label>
              </li>
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="player"
                    value="orange"
                  />
                  <span class="radio-box"></span>
                  Orange
                  <div class="selected-marker"></div>
                </label>
              </li>
            </ul>
          </section>
          <section class="settings-section">
            <h2 class="settings-section__title">
              <img src="/assets/imgs/style.svg" alt="Style icon" />Board size
            </h2>
            <ul class="settings-section__options">
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="size"
                    value="16"
                  />
                  <span class="radio-box"></span>
                  16 cards
                  <div class="selected-marker"></div>
                </label>
              </li>
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="size"
                    value="24"
                  />
                  <span class="radio-box"></span>
                  24 cards
                  <div class="selected-marker"></div>
                </label>
              </li>
              <li class="settings-section__option">
                <label>
                  <input
                    class="settings-section__option__input"
                    type="radio"
                    name="size"
                    value="36"
                  />
                  <span class="radio-box"></span>
                  36 cards
                  <div class="selected-marker"></div>
                </label>
              </li>
            </ul>
          </section>
        </div>
        <div class="right-container">
          <img
            class="settings-image"
            src="/assets/imgs/themes/code-vibe-theme/theme-visual.svg"
            alt="visual representation of the code vibe theme"
          />
          <section class="showcase-section">
            <div class="showcase-section__content">
              <p class="showcase-section__text">
                <span id="selected-theme-value"></span> Theme
              </p>
              <div class="showcase-section__divider"></div>
              <p class="showcase-section__text">
                <span id="selected-player-value"></span> Player
              </p>
              <div class="showcase-section__divider"></div>
              <p class="showcase-section__text">
                Board<span id="selected-size-value"> size</span>
              </p>
            </div>
            <a
              id="start-button"
              class="sm-btn showcase-section__btn unselect"
              href="/src/pages/game.html"
            >
              <img
                class="showcase-section__btn__img"
                src="/assets/imgs/smart-display.svg"
                alt="play icon"
              /><span class="showcase-section__btn__text">Start</span>
            </a>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>
